<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="amux logo">
  <!-- app-icon background -->
  <rect width="256" height="256" rx="56" fill="#0d1117"/>
  <rect x="1" y="1" width="254" height="254" rx="55" stroke="#30363d" stroke-width="2"/>

  <!-- terminal window with tiled panes = a multiplexer of agents -->
  <g transform="translate(48,52)">
    <rect width="160" height="152" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>

    <!-- title bar traffic lights -->
    <circle cx="24" cy="24" r="6" fill="#f85149"/>
    <circle cx="46" cy="24" r="6" fill="#d29922"/>
    <circle cx="68" cy="24" r="6" fill="#3fb950"/>

    <!-- pane dividers (2x2 tile) -->
    <line x1="80" y1="48" x2="80" y2="140" stroke="#30363d" stroke-width="2"/>
    <line x1="14" y1="96" x2="146" y2="96" stroke="#30363d" stroke-width="2"/>

    <!-- active agent pane (top-left) glows green -->
    <rect x="14" y="48" width="66" height="48" fill="#3fb950" fill-opacity="0.15"/>
    <rect x="14" y="48" width="66" height="48" stroke="#3fb950" stroke-opacity="0.65" stroke-width="2"/>

    <!-- prompts: active pane bright, others muted -->
    <path d="M24 64 l8 7 -8 7" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="76" width="20" height="4" rx="2" fill="#3fb950"/>
    <path d="M92 64 l8 7 -8 7" stroke="#6e7681" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 112 l8 7 -8 7" stroke="#6e7681" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M92 112 l8 7 -8 7" stroke="#6e7681" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
